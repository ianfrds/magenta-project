<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magenta Kidz - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        magenta: {
                            50: '#fff1f2', 100: '#ffe4e6', 200: '#fecdd3', 300: '#fda4af', 400: '#fb7185',
                            500: '#f43f5e', 600: '#e11d48', 700: '#be123c', 800: '#9f1239', 900: '#881337',
                        },
                        kidz: {
                            purple: '#9C27B0',
                            orange: '#FF9800',
                            yellow: '#FFC107',
                            green: '#4CAF50',
                            blue: '#2196F3',
                        }
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
                        'bubble': '0 10px 25px -5px rgba(0, 0, 0, 0.2), inset 0 -4px 0 rgba(0,0,0,0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-image: url('../assets/kidz/kids dashboard/Red and Brown Illustrated Kids Presentation.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 4px solid rgba(255, 255, 255, 0.9);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        .bubble-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .bubble-btn:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.3), inset 0 -6px 0 rgba(0, 0, 0, 0.15);
        }

        .bubble-btn:active {
            transform: translateY(2px) scale(0.98);
            box-shadow: inset 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        .animate-float {
            animation: float 4s ease-in-out infinite;
        }

        .input-bubble {
            background: white;
            border: 3px solid #f0f0f0;
            border-radius: 20px;
            padding: 12px 20px;
            font-weight: 600;
            transition: all 0.2s;
            outline: none;
        }

        .input-bubble:focus {
            border-color: #9C27B0;
            box-shadow: 0 0 0 4px rgba(156, 39, 176, 0.1);
        }
    </style>
</head>

<body class="p-6">

    <div class="w-full max-w-md">
        <div class="glass-panel rounded-[3rem] p-10 relative overflow-hidden">
            <!-- Decorative Sparkles -->
            <img src="../assets/kidz/3d_magic_sparkles.png" class="absolute -top-4 -right-4 w-24 h-24 opacity-40 animate-pulse pointer-events-none" style="mix-blend-mode: multiply;">
            <img src="../assets/kidz/3d_letter_a.png" class="absolute -bottom-6 -left-6 w-20 h-20 opacity-30 animate-float pointer-events-none" style="mix-blend-mode: multiply;">

            <!-- Mascot & Logo -->
            <div class="flex flex-col items-center mb-8">
                <div class="w-32 h-32 bg-yellow-300 rounded-full border-4 border-white shadow-lg flex items-center justify-center overflow-hidden mb-6 animate-float">
                    <img src="../assets/kidz/3d_fox_mascot.png" class="w-24 h-24 object-contain" style="mix-blend-mode: multiply;" alt="Fox Mascot">
                </div>
                <h1 class="text-3xl font-black text-slate-800 tracking-tight text-center">Hello Explorer!</h1>
                <p class="text-sm font-bold text-kidz-purple uppercase tracking-widest mt-2">Sign in to start your adventure</p>
            </div>

            <!-- Login Form -->
            <form action="kidz-dashboard.html" class="space-y-6">
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-4">Explorer Name</label>
                    <input type="text" placeholder="Your cool nickname..." class="w-full input-bubble text-slate-800 placeholder-slate-300">
                </div>
                
                <div>
                    <label class="block text-xs font-black text-slate-500 uppercase tracking-widest mb-2 ml-4">Secret Code</label>
                    <input type="password" placeholder="••••••••" class="w-full input-bubble text-slate-800 placeholder-slate-300">
                </div>

                <div class="pt-2">
                    <button type="submit" class="w-full bubble-btn bg-kidz-purple text-white py-4 rounded-[1.5rem] font-black text-lg shadow-bubble tracking-wide flex items-center justify-center gap-3">
                        START MISSION!
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 5l7 7-7 7M5 5l7 7-7 7"></path></svg>
                    </button>
                </div>
            </form>

            <!-- Back Link -->
            <div class="mt-8 text-center">
                <a href="../index.html" class="inline-flex items-center gap-2 text-slate-400 hover:text-slate-600 font-bold transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    Back to Portal
                </a>
            </div>
        </div>
    </div>

</body>

</html>
