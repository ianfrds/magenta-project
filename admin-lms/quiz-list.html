<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magenta LMS - Quiz List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neutral: { 50: '#F8F9FA', 100: '#F1F3F5', 500: '#ADB5BD', 600: '#868E96', 700: '#495057', 900: '#212529' },
                        primary: { 50: '#E7F5FF', 600: '#228BE6', 700: '#1C7ED6' },
                        magenta: { 50: '#FFF0F6', 500: '#F06595', 600: '#E64980', 700: '#D6336C' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
</head>
<body class="text-neutral-900 antialiased bg-neutral-50">
    <div class="flex min-h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-neutral-200 flex flex-col sticky top-0 h-screen">
            <div class="p-6 flex items-center gap-3">
                <div class="w-10 h-10 bg-magenta-500 rounded-xl flex items-center justify-center text-white font-bold text-xl">M</div>
                <span class="font-extrabold text-xl tracking-tight">Magenta<span class="text-magenta-500">LMS</span></span>
            </div>
            <nav class="flex-1 px-4 space-y-1">
                <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-neutral-500 hover:text-primary-600 hover:bg-neutral-50 rounded-xl font-medium transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard
                </a>
                <div class="relative group">
                    <div class="flex items-center justify-between px-4 py-3 text-magenta-700 bg-magenta-50 rounded-xl font-medium transition-all cursor-pointer">
                        <div class="flex items-center gap-3">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                            Quiz
                        </div>
                        <svg class="w-4 h-4 transform rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                    <div id="quiz-submenu" class="mt-1 pl-11 pr-4 space-y-1">
                        <a href="quiz-list.html" class="block px-3 py-2 text-sm text-magenta-600 bg-magenta-50 rounded-lg transition-all font-semibold">Quiz List</a>
                        <a href="#" class="block px-3 py-2 text-sm text-neutral-500 hover:text-magenta-600 hover:bg-magenta-50 rounded-lg transition-all">Create Quiz</a>
                    </div>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 p-10 overflow-y-auto">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 class="text-3xl font-extrabold text-neutral-900 tracking-tight">Quiz List</h1>
                    <p class="text-neutral-500 mt-1">Manage and preview all your created quizzes here.</p>
                </div>
                <button class="px-6 py-2.5 bg-magenta-500 text-white rounded-xl font-bold shadow-lg shadow-magenta-200 hover:bg-magenta-600 hover:-translate-y-0.5 transition-all">Create New Quiz</button>
            </header>

            <div class="bg-white rounded-2xl border border-neutral-100 shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-neutral-50 border-b border-neutral-100 text-sm font-semibold text-neutral-500 uppercase tracking-wider">
                            <th class="p-5">Quiz Title</th>
                            <th class="p-5">Questions</th>
                            <th class="p-5">Status</th>
                            <th class="p-5 text-right">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-neutral-100">
                        <tr class="hover:bg-neutral-50 transition-colors">
                            <td class="p-5 font-bold text-neutral-900">TOEFL Structure & Written Expression - Part A</td>
                            <td class="p-5 text-neutral-600">10 Questions</td>
                            <td class="p-5"><span class="px-2.5 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">Published</span></td>
                            <td class="p-5 text-right">
                                <a href="quiz-preview.html" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-50 text-primary-600 hover:bg-primary-100 font-semibold rounded-lg text-sm transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    Preview
                                </a>
                            </td>
                        </tr>
                        <tr class="hover:bg-neutral-50 transition-colors">
                            <td class="p-5 font-bold text-neutral-900">TOEFL Reading Comprehension - Biology Section</td>
                            <td class="p-5 text-neutral-600">15 Questions</td>
                            <td class="p-5"><span class="px-2.5 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">Draft</span></td>
                            <td class="p-5 text-right">
                                <a href="quiz-preview.html" class="inline-flex items-center gap-2 px-4 py-2 bg-primary-50 text-primary-600 hover:bg-primary-100 font-semibold rounded-lg text-sm transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                                    Preview
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
</body>
</html>
